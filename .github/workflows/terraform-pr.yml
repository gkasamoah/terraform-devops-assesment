name: Terraform PR Validation

on:
  pull_request:
    branches:
      - main
      - release/*

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: terraform-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-and-plan:
    runs-on: ubuntu-latest
    environment: staging
    env:
      TF_IN_AUTOMATION: "true"
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d8e7afde0c5a0f8b

      - name: Start MinIO backend
        run: docker compose up -d

      - name: Wait for MinIO to become ready
        run: bash ./bootstrap/wait-for-minic.sh

      - name: Create Terraform remote state bucket
        run: bash ./bootstrap/create-bucket.sh

      - name: Terraform format check
        run: docker run --rm -v "$PWD:/work" -w /work hashicorp/terraform:1.11.4 fmt -check -recursive

      - name: Terraform init
        working-directory: environments/staging
        run: docker run --rm -v "$PWD/../..:/work" -w /work/environments/staging hashicorp/terraform:1.11.4 init -reconfigure

      - name: Terraform validate
        working-directory: environments/staging
        run: docker run --rm -v "$PWD/../..:/work" -w /work/environments/staging hashicorp/terraform:1.11.4 validate

      - name: Static analysis with TFLint
        run: |
          docker run --rm -v "$PWD:/data" -w /data ghcr.io/terraform-linters/tflint:0.53.0 --init
          docker run --rm -v "$PWD:/data" -w /data ghcr.io/terraform-linters/tflint:0.53.0 --recursive

      - name: Static analysis with Trivy
        run: docker run --rm -v "$PWD:/work" -w /work aquasec/trivy:0.62.1 config --severity HIGH,CRITICAL --exit-code 1 .

      - name: Terraform plan
        working-directory: environments/staging
        run: |
          docker run --rm -v "$PWD/../..:/work" -w /work/environments/staging hashicorp/terraform:1.11.4 plan -no-color > tfplan.txt
          cat tfplan.txt

      - name: Comment Terraform plan on PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "$PR_NUMBER" --body-file tfplan.txt
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
