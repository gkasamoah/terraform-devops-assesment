version: "3.9"

services:

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: terraform-minio

    ports:
      - "9000:9000"
      - "9001:9001"

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

    command: server /data --console-address ":9001"

    volumes:
      - minio_data:/data

volumes:
  minio_data:
